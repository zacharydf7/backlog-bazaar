<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Backlog Bazaar coin (opal)">
  <!-- Opal Mint (Curio Shop skin): a milky opal face with soft colour play —
       the mint.svg composition in pearl, with a slow iridescent sheen that
       drifts across the stone (stilled under prefers-reduced-motion). -->
  <style>
    .op-sweep { animation: op-sweep 6s linear infinite; }
    @keyframes op-sweep {
      0% { transform: translateX(-34px); }
      100% { transform: translateX(34px); }
    }
    .op-flow { animation: op-flow 8s linear infinite; }
    @keyframes op-flow {
      from { transform: translateX(0); }
      to { transform: translateX(-32px); }
    }
    .op-glim {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: op-glim 4.2s ease-in-out infinite;
    }
    @keyframes op-glim {
      0%, 78%, 100% { opacity: 0; transform: scale(0.6); }
      88% { opacity: 1; transform: scale(1.1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .op-sweep, .op-glim { animation: none; opacity: 0; }
      .op-flow { animation: none; }
    }
  </style>
  <defs>
    <radialGradient id="op-face" cx="36%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="42%" stop-color="#F6F1F9"/>
      <stop offset="100%" stop-color="#CFC3E2"/>
    </radialGradient>
    <linearGradient id="op-rim" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%" stop-color="#A5F3FC"/>
      <stop offset="28%" stop-color="#C4B5FD"/>
      <stop offset="52%" stop-color="#F0ABFC"/>
      <stop offset="78%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="op-band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0"/>
      <stop offset="35%" stop-color="#F0ABFC" stop-opacity="0.5"/>
      <stop offset="65%" stop-color="#A5F3FC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0"/>
    </linearGradient>
    <!-- Two full colour cycles across the rect, so a half-width shift loops
         seamlessly — the title chip's flowing gradient, struck in the coin -->
    <linearGradient id="op-cycle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="12.5%" stop-color="#C4B5FD"/>
      <stop offset="25%" stop-color="#F0ABFC"/>
      <stop offset="37.5%" stop-color="#86EFAC"/>
      <stop offset="50%" stop-color="#7DD3FC"/>
      <stop offset="62.5%" stop-color="#C4B5FD"/>
      <stop offset="75%" stop-color="#F0ABFC"/>
      <stop offset="87.5%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <filter id="op-blur"><feGaussianBlur stdDeviation="1.1"/></filter>
    <clipPath id="op-clip"><circle cx="24" cy="23.2" r="15.9"/></clipPath>
    <path id="op-mono" fill-rule="evenodd" d="M14.5 15 H26 C29.6 15 31.5 16.8 31.5 19.4 C31.5 21.6 30.2 23 28.4 23.6 C30.8 24.2 32.5 25.8 32.5 28.3 C32.5 31.2 30.3 33 26.6 33 H14.5 V30.4 H16.6 V17.6 H14.5 Z M20.6 17.6 V22.4 H25.6 C27.2 22.4 28 21.5 28 20 C28 18.5 27.2 17.6 25.6 17.6 Z M20.6 24.9 V30.4 H26.2 C28 30.4 28.9 29.4 28.9 27.6 C28.9 25.9 28 24.9 26.2 24.9 Z"/>
  </defs>

  <ellipse cx="24" cy="25.8" rx="20.6" ry="20.4" fill="#1E1B4B" opacity="0.4"/>
  <circle cx="24" cy="24" r="21" fill="#312E81"/>
  <circle cx="24" cy="23.6" r="20.4" fill="url(#op-rim)"/>

  <circle cx="24" cy="23.6" r="18.9" fill="none" stroke="#6D28D9" stroke-width="2.6" stroke-dasharray="1.1 2.025" opacity="0.5"/>

  <circle cx="24" cy="23.6" r="16.8" fill="#A78BFA"/>
  <circle cx="24" cy="23.2" r="15.9" fill="url(#op-face)"/>

  <!-- The colour play: bold, barely-blurred patches so the fire reads even
       at 16px — this is what says "opal, not silver" -->
  <g clip-path="url(#op-clip)" filter="url(#op-blur)">
    <ellipse cx="14.5" cy="16.5" rx="6" ry="4.4" fill="#38BDF8" opacity="0.8"/>
    <ellipse cx="31.5" cy="15" rx="5.4" ry="4" fill="#E879F9" opacity="0.8"/>
    <ellipse cx="31" cy="31" rx="6.2" ry="4.4" fill="#A78BFA" opacity="0.85"/>
    <ellipse cx="15" cy="31" rx="5" ry="3.8" fill="#4ADE80" opacity="0.7"/>
    <ellipse cx="23" cy="22.5" rx="5" ry="3.6" fill="#FB7185" opacity="0.6"/>
    <ellipse cx="23.5" cy="9.5" rx="4.4" ry="2.8" fill="#2DD4BF" opacity="0.7"/>
    <ellipse cx="9.5" cy="24" rx="3.4" ry="3" fill="#F0ABFC" opacity="0.7"/>
  </g>

  <!-- The flowing colour transition washing endlessly across the stone -->
  <g clip-path="url(#op-clip)">
    <rect class="op-flow" x="8" y="6" width="64" height="36" fill="url(#op-cycle)" opacity="0.32"/>
  </g>

  <circle cx="24" cy="23.2" r="14.4" fill="none" stroke="#FFFFFF" stroke-width="0.7" opacity="0.6"/>
  <circle cx="24" cy="23.2" r="13.6" fill="none" stroke="#7C3AED" stroke-width="0.9" opacity="0.65"/>

  <use href="#op-mono" x="-0.3" y="-1.5" fill="#FFFFFF" opacity="0.8"/>
  <use href="#op-mono" x="0.2" y="-0.8" fill="#6D28D9"/>

  <!-- The drifting iridescent sheen, clipped to the stone -->
  <g clip-path="url(#op-clip)">
    <rect class="op-sweep" x="8" y="6" width="20" height="36" fill="url(#op-band)" transform-origin="24 24" opacity="0.8"/>
  </g>

  <path d="M11.6 15.6 A14.5 14.5 0 0 1 27.4 10.4" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
  <path d="M35 9.4 l1 2.3 2.3 1 -2.3 1 -1 2.3 -1 -2.3 -2.3 -1 2.3 -1 Z" fill="#FFFFFF" opacity="0.85"/>
  <!-- Glimmer: sparkles popping around the rim on staggered clocks -->
  <path class="op-glim" d="M9.6 33.4 l0.8 1.8 1.8 0.8 -1.8 0.8 -0.8 1.8 -0.8 -1.8 -1.8 -0.8 1.8 -0.8 Z" fill="#FFFFFF"/>
  <path class="op-glim" style="animation-delay: 1.6s" d="M39.4 26.6 l0.7 1.6 1.6 0.7 -1.6 0.7 -0.7 1.6 -0.7 -1.6 -1.6 -0.7 1.6 -0.7 Z" fill="#F0ABFC"/>
  <path class="op-glim" style="animation-delay: 2.9s" d="M13.4 8.2 l0.7 1.6 1.6 0.7 -1.6 0.7 -0.7 1.6 -0.7 -1.6 -1.6 -0.7 1.6 -0.7 Z" fill="#A5F3FC"/>
</svg>
