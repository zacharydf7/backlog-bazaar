<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Backlog Bazaar coin (arcade token)">
  <!-- Arcade Token (Curio Shop skin): a worn brass token good for one play —
       the mint.svg composition with a bold relief star and "1" in place of
       the monogram. -->
  <defs>
    <radialGradient id="at-face" cx="36%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#FFF3C9"/>
      <stop offset="42%" stop-color="#E0B54E"/>
      <stop offset="100%" stop-color="#96702A"/>
    </radialGradient>
    <linearGradient id="at-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F6DA8C"/>
      <stop offset="55%" stop-color="#C2913B"/>
      <stop offset="100%" stop-color="#5C430E"/>
    </linearGradient>
    <!-- A five-point star with a slab "1" punched over its centre -->
    <g id="at-mark">
      <path d="M24 12.2 L27 19 L34.4 19.8 L28.9 24.7 L30.4 32 L24 28.2 L17.6 32 L19.1 24.7 L13.6 19.8 L21 19 Z"/>
      <path d="M22.6 20.4 L25.4 19.6 V27.2 H27 V29.6 H21.4 V27.2 H23.2 V22.5 L22.6 22.7 Z" fill-rule="evenodd"/>
    </g>
  </defs>

  <ellipse cx="24" cy="25.8" rx="20.6" ry="20.4" fill="#2E2208" opacity="0.35"/>
  <circle cx="24" cy="24" r="21" fill="#4A3609"/>
  <circle cx="24" cy="23.6" r="20.4" fill="url(#at-rim)"/>

  <circle cx="24" cy="23.6" r="18.9" fill="none" stroke="#6B4F13" stroke-width="2.6" stroke-dasharray="1.1 2.025" opacity="0.5"/>

  <circle cx="24" cy="23.6" r="16.8" fill="#7D5D1E"/>
  <circle cx="24" cy="23.2" r="15.9" fill="url(#at-face)"/>

  <circle cx="24" cy="23.2" r="14.4" fill="none" stroke="#FFF0BF" stroke-width="0.7" opacity="0.55"/>
  <circle cx="24" cy="23.2" r="13.6" fill="none" stroke="#8F6B24" stroke-width="0.9" opacity="0.75"/>

  <use href="#at-mark" x="-0.3" y="-1.5" fill="#FFF0BF" opacity="0.7"/>
  <use href="#at-mark" x="0.2" y="-0.8" fill="#6B4E12"/>

  <path d="M11.6 15.6 A14.5 14.5 0 0 1 27.4 10.4" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M35 9.4 l1 2.3 2.3 1 -2.3 1 -1 2.3 -1 -2.3 -2.3 -1 2.3 -1 Z" fill="#FFFFFF" opacity="0.8"/>
</svg>
