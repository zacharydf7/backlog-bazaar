<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Backlog Bazaar coin (radiant)">
  <!-- Radiant Mint (Curio Shop skin, premium): the Minted B polished to a
       mirror shine — a glint band sweeps the face every few seconds. The
       animation is CSS inside the SVG so it runs in <img> embeds and stills
       itself under prefers-reduced-motion (the static coin stays radiant). -->
  <defs>
    <radialGradient id="ra-face" cx="36%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#FFFBE0"/>
      <stop offset="42%" stop-color="#FFD84D"/>
      <stop offset="100%" stop-color="#EA9210"/>
    </radialGradient>
    <linearGradient id="ra-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE68A"/>
      <stop offset="55%" stop-color="#E9A21C"/>
      <stop offset="100%" stop-color="#93540A"/>
    </linearGradient>
    <linearGradient id="ra-glint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <path id="ra-mono" fill-rule="evenodd" d="M14.5 15 H26 C29.6 15 31.5 16.8 31.5 19.4 C31.5 21.6 30.2 23 28.4 23.6 C30.8 24.2 32.5 25.8 32.5 28.3 C32.5 31.2 30.3 33 26.6 33 H14.5 V30.4 H16.6 V17.6 H14.5 Z M20.6 17.6 V22.4 H25.6 C27.2 22.4 28 21.5 28 20 C28 18.5 27.2 17.6 25.6 17.6 Z M20.6 24.9 V30.4 H26.2 C28 30.4 28.9 29.4 28.9 27.6 C28.9 25.9 28 24.9 26.2 24.9 Z"/>
    <clipPath id="ra-clip"><circle cx="24" cy="23.2" r="15.9"/></clipPath>
    <style>
      .ra-sweep { animation: ra-sweep 4.5s ease-in-out infinite; }
      @keyframes ra-sweep {
        0%        { transform: translateX(-40px) skewX(-18deg); }
        30%, 100% { transform: translateX(40px)  skewX(-18deg); }
      }
      @media (prefers-reduced-motion: reduce) { .ra-sweep { animation: none; } }
    </style>
  </defs>

  <ellipse cx="24" cy="25.8" rx="20.6" ry="20.4" fill="#3f2003" opacity="0.35"/>
  <circle cx="24" cy="24" r="21" fill="#6E3605"/>
  <circle cx="24" cy="23.6" r="20.4" fill="url(#ra-rim)"/>

  <circle cx="24" cy="23.6" r="18.9" fill="none" stroke="#7C3F05" stroke-width="2.6" stroke-dasharray="1.1 2.025" opacity="0.5"/>

  <circle cx="24" cy="23.6" r="16.8" fill="#A55A09"/>
  <circle cx="24" cy="23.2" r="15.9" fill="url(#ra-face)"/>

  <circle cx="24" cy="23.2" r="14.4" fill="none" stroke="#FFF6CC" stroke-width="0.7" opacity="0.6"/>
  <circle cx="24" cy="23.2" r="13.6" fill="none" stroke="#BC6E0A" stroke-width="0.9" opacity="0.75"/>

  <use href="#ra-mono" x="-0.3" y="-1.5" fill="#FFF6CC" opacity="0.75"/>
  <use href="#ra-mono" x="0.2" y="-0.8" fill="#95500A"/>

  <!-- The sweeping glint, clipped to the face -->
  <g clip-path="url(#ra-clip)">
    <rect class="ra-sweep" x="14" y="4" width="12" height="40" fill="url(#ra-glint)"/>
  </g>

  <path d="M11.6 15.6 A14.5 14.5 0 0 1 27.4 10.4" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
  <path d="M35 9.4 l1 2.3 2.3 1 -2.3 1 -1 2.3 -1 -2.3 -2.3 -1 2.3 -1 Z" fill="#FFFFFF" opacity="0.85"/>
</svg>
