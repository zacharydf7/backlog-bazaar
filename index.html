<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/coins/bb.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backlog Bazaar</title>
    <!-- Apply the saved (or system-derived) theme before paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("bb-theme");
          if (!t)
            t = matchMedia("(prefers-color-scheme: dark)").matches
              ? "midnight"
              : "ledger";
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
